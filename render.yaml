services:
  - type: web
    name: lucky-spin-lab-server
    runtime: node
    buildCommand: npm install && npm run build -w apps/server
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CLIENT_ORIGIN
        sync: false   # set manually in Render dashboard to your Vercel URL
